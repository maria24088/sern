ARES_GREATSWORD:
  Id: NETHERITE_SWORD
  Model: 4211
  Display: '&6Ares &fGreatSword'
  Lore:
  - ''
  - '&eLeadership:'
  - '&cShift + RMB'
  - '&7Call upon your legion'
  - '&7for temporary combat'
  - '&7assistance'
  - ''
  - '&eGrandiose:'
  - '&cShift + LMB'
  - '&7Summon your heavenly'
  - '&7weaponry. Calling down'
  - '&7Grandiose, the GREATSWORD'
  - ''
  Skills:
  - skill{s=Leadership} @self ~onUse ?crouching
  - skill{s=Grandiose} @self ~onLeftClick ?crouching
  Hide:
  - ATTRIBUTES
ARES_SHIELD:
  Id: SHIELD
  Model: 4211
  Display: '&6Ares &fShield'
  Lore:
  - ""
  - '&eRetribution:'
  - '&cPassive'
  - '&7Allow yourself to take damage'
  - '&7bottling this damage within,'
  - '&7and once completed, will send'
  - '&7all of the recieved damage.'
  - ''
  - '&eShieldBash:'
  - '&cRMB'
  - '&7Launch yourself like'
  - '&7an projectile, harming'
  - '&7entities in your line of sight!'
  - ''
  Hide:
  - ATTRIBUTES
  Skills:
  - skill{s=Retribution} @self ~onDamaged ?holding{m=ARES_SHIELD} 0.5
  - skill{s=ShieldBash} @target ~onUse



