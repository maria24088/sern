noxus_staff_fx:
  Type: TEXT_DISPLAY
  Display: "PARTICLE"
  DisplayOptions:
    Text: "✫"
    BackgroundColor: 0000000000
    BlockLight: 15
    SkyLight: 15
    Billboard: CENTER
    Scale: 4,4,4
  Skills:
  - displaytransformation{action=set;transformation=scale;value=<random.float.3.5to4.5>,<random.float.3.5to4.5>,<random.float.3.5to4.5>} @self ~onSpawn
  - displaytransformation{action=set;transformation=translation;value=<random.float.-0.15to0.15>,<random.float.-0.15to0.15>,<random.float.-0.15to0.15>} @self ~onSpawn
  - settextdisplay{text="✬";delay=2} @self ~onSpawn
  - settextdisplay{text="✭";delay=4} @self ~onSpawn
  - settextdisplay{text="✮";delay=6} @self ~onSpawn
  - settextdisplay{text="✯";delay=8} @self ~onSpawn
  - settextdisplay{text="✰";delay=10} @self ~onSpawn
  - settextdisplay{text="✱";delay=12} @self ~onSpawn
  - settextdisplay{text="✲";delay=14} @self ~onSpawn
  - settextdisplay{text="";delay=16} @self ~onSpawn
  - remove{delay=18} @self ~onSpawn

LR_noxus_staff_poison:
  Type: ARMOR_STAND
  Display: "POISON"
  Options:
    Marker: true
    Collidable: false
  Skills:
  - model{mid=noxus_staff_poison_fx;scale=<random.float.0.5to1.15>;usm=true;showhitbox=false;h=false} @self ~onSpawn
  - model{mid=noxus_staff_poison_fx;scale=<random.float.0.5to1.15>;usm=true;showhitbox=false;h=false} @self ~onLoad
  - bodyrotation{md=0;mb=0;rde=0;rdu=0} @self ~onSpawn
  - bodyrotation{md=0;mb=0;rde=0;rdu=0} @self ~onLoad
  - brightness{b=15;s=15} @self ~onSpawn
  - brightness{b=15;s=15} @self ~onLoad
  - effect:particles{particle=dust_color_transition;color1=#ffffff;color2=#b1ff00;amount=4;hs=.25;vs=.25;d=true;dir=0,1,0;s=0.1} @modelpart{pid=root} ~onTimer:5
  - remove{delay=20} @self ~onSpawn

LR_noxus_staff_projectile:
  Type: ARMOR_STAND
  Display: "POISONFX"
  Options:
    Marker: true
    Collidable: false
  Skills:
  - model{mid=noxus_projectile_fx;scale=<random.float.0.5to0.75>;usm=true;showhitbox=false;h=false} @self ~onSpawn
  - model{mid=noxus_projectile_fx;scale=<random.float.0.5to0.75>;usm=true;showhitbox=false;h=false} @self ~onLoad
  - bodyrotation{md=0;mb=0;rde=0;rdu=0} @self ~onSpawn
  - bodyrotation{md=0;mb=0;rde=0;rdu=0} @self ~onLoad
  - brightness{b=15;s=15} @self ~onSpawn
  - brightness{b=15;s=15} @self ~onLoad
  - effect:particles{particle=dust_color_transition;color1=#ffffff;color2=#b1ff00;amount=4;hs=.25;vs=.25;d=true;dir=0,1,0;s=0.1} @modelpart{pid=root} ~onTimer:5