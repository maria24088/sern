khansnpcs_quindle_the_mage:
  Type: PIG
  Display: 'Quindle'
  Faction: KHANS_NPCS
  Health: 999
  Damage: 0
  # NoAI hace que se quede quieto como una estatua y optimiza el server
  Options:
    NoAI: true
    KnockbackResistance: 1
    Silent: true
    Invincible: true
    Collidable: false
    PreventSunburn: true
    PreventBlockInfection: true
    PreventOtherDrops: true
    PreventRandomEquipment: true
    PreventJockeyMounts: true
    MovementSpeed: 0
    ShowHealth: false
    AlwaysShowName: false
    Despawn: PERSISTENT
    NoGravity: true
    Invincible: true
    FollowRange: 1
    Silent: true
    KnockbackResistance: 1
    PreventSunburn: true
  Skills:
  - model{mid=khansnpcs_quindle_the_mage;n=false;step=1;damagetint=false;save=true} @self ~onSpawn
  - model{mid=khansnpcs_quindle_the_mage;n=false;step=1;damagetint=false;save=true} @self ~onLoad
  - partvisibility{model=khansnpcs_quindle_the_mage;pid=red_fire;v=false;child=true} @self ~onSpawn
  - partvisibility{model=khansnpcs_quindle_the_mage;pid=red_fire;v=false;child=true} @self ~onLoad
  - brightness{mid=khansnpcs_quindle_the_mage;b=15;s=15} @self ~onSpawn
  - brightness{mid=khansnpcs_quindle_the_mage;b=15;s=15} @self ~onLoad
  - skill{s=khansnpcs_quindle_the_mage_emotes} @self ~onTimer:260
  - skill{s=khansnpcs_quindle_the_mage_interact} ~onInteract
  - teleport @CasterSpawnLocation ~onTimer:140
  - command{c="ae open <trigger.name> enchanter";console=true} @trigger ~onInteract
  - cancelEvent @self ~onDamaged

