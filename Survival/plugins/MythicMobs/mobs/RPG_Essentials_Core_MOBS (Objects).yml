# OBJECTS #

# Storage Chest #

Storage_Chest:
  Type: SKELETON
  Display: 'Storage_Chest'
  Health: 500
  Damage: 1
  Faction: Essentials
  Options:
    MovementSpeed: 0
    ShowHealth: false
    PreventRandomEquipment: true
    AlwaysShowName: false
    Despawn: PERSISTENT
    NoGravity: true
    Invincible: true
    Collidable: false
    PreventOtherDrops: true
    FollowRange: 1
    Silent: true
    KnockbackResistance: 1
    PreventSunburn: true
  AIGoalSelectors:
  - clear
  AITargetSelectors:
  - clear
  Skills:
  - model{mid=obj_storage_chest;step=1;tint=false;usm=true;save=true;lockpitch=true;lockyaw=true} @self ~onSpawn
  - model{mid=obj_storage_chest;step=1;tint=false;usm=true;save=true;lockpitch=true;lockyaw=true} @self ~onLoad
  - model{mid=obj_storage_chest;step=1;tint=false;usm=true;save=true;lockpitch=true;lockyaw=true} @self ~onTimer:100
  - BodyRotation{mh=360;mb=360;player=true} @self ~onSpawn
  - BodyRotation{mh=360;mb=360;player=true} @self ~onLoad

  - cancelevent{sync=true} ~onAttack
  - cancelevent{sync=true} @self ~onDamaged
  - setvariable{var=caster.spawnx;value=<caster.l.x>;type=FLOAT} @self ~onSpawn
  - setvariable{var=caster.spawny;value=<caster.l.y>;type=FLOAT} @self ~onSpawn
  - setvariable{var=caster.spawnz;value=<caster.l.z>;type=FLOAT} @self ~onSpawn
  - tp @Location{x=<caster.var.spawnx>;y=<caster.var.spawny>;z=<caster.var.spawnz>;delay=2} ~onTimer:2 ?!hasaura{n=EDIT_AURA}
  - look{headOnly=false;immediately=true;f=true;fp=true} @owner ~onTimer:1 ?hasaura{n=EDIT_AURA}
  - tp @Forward{f=2;y=1;ofowner=true} ~onTimer:1 ?hasaura{n=EDIT_AURA}
  - skill{s=NPC_EDIT} ~onInteract
  - skill{s=NPC_SET_LOCK_VERSION} ~onInteract
  - skill{s=NPC_REMOVE} ~onInteract ?hasaura{n=EDIT_AURA}

  # INTERACT
  - skill{s=OBJ_STORAGE_CHEST_INTERACT} ~onInteract

