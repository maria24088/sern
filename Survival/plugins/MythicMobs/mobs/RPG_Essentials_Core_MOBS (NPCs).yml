# NPCS #

NPC_Merchant_Basic:
  Type: SKELETON
  Display: 'NPC_Merchant_Basic'
  Health: 500
  Damage: 1
  Faction: Essentials
  Options:
    MovementSpeed: 0
    ShowHealth: false
    PreventRandomEquipment: true
    AlwaysShowName: false
    Despawn: PERSISTENT
    NoGravity: true
    Invincible: true
    Collidable: false
    PreventOtherDrops: true
    FollowRange: 1
    Silent: true
    KnockbackResistance: 1
    PreventSunburn: true
  AIGoalSelectors:
  - clear
  AITargetSelectors:
  - clear
  Variables:
    Name: §f§lRandall
    Color: FFFFFF
  Skills:
  - model{mid=npc_merchant_basic;step=1;tint=false;usm=true;save=true;lockpitch=false;lockyaw=false} @self ~onSpawn
  - model{mid=npc_merchant_basic;step=1;tint=false;usm=true;save=true;lockpitch=false;lockyaw=false} @self ~onLoad
  - model{mid=npc_merchant_basic;step=1;tint=false;usm=true;save=true;lockpitch=false;lockyaw=false} @self ~onTimer:100
  - BodyRotation{mh=0;mb=65;player=true} @self ~onSpawn
  - BodyRotation{mh=0;mb=65;player=true} @self ~onLoad
  - setmodeltag{m=npc_merchant_basic;p=name;tag="&6&l[Comerciante]";v=true} @self ~onSpawn
  - setmodeltag{m=npc_merchant_basic;p=name;tag="&6&l[Comerciante]";v=true} @self ~onLoad
  - setmodeltag{m=npc_merchant_basic;p=name;tag="&6&l[Comerciante]";v=true} @self ~onTimer:150
  - setmodeltag{m=npc_merchant_basic;p=health;tag="<caster.var.Name>";v=true} @self ~onSpawn
  - setmodeltag{m=npc_merchant_basic;p=health;tag="<caster.var.Name>";v=true} @self ~onLoad
  - setmodeltag{m=npc_merchant_basic;p=health;tag="<caster.var.Name>";v=true} @self ~onTimer:150

  - cancelevent{sync=true} ~onAttack
  - cancelevent{sync=true} @self ~onDamaged
  - setvariable{var=caster.spawnx;value=<caster.l.x>;type=FLOAT} @self ~onSpawn
  - setvariable{var=caster.spawny;value=<caster.l.y>;type=FLOAT} @self ~onSpawn
  - setvariable{var=caster.spawnz;value=<caster.l.z>;type=FLOAT} @self ~onSpawn
  - tp @Location{x=<caster.var.spawnx>;y=<caster.var.spawny>;z=<caster.var.spawnz>;delay=2} ~onTimer:2 ?!hasaura{n=EDIT_AURA}
  - look{headOnly=false;immediately=true;f=true;fp=true} @owner ~onTimer:1 ?hasaura{n=EDIT_AURA}
  - tp @Forward{f=2;y=1;ofowner=true} ~onTimer:1 ?hasaura{n=EDIT_AURA}
  - skill{s=NPC_EDIT} ~onInteract
  - skill{s=NPC_SET;rot=65} ~onInteract
  - skill{s=NPC_REMOVE} ~onInteract ?hasaura{n=EDIT_AURA}
  - skill{s=NPC_MODE} ~onTimer:10 ?hasaura{n=EDIT_AURA}
  - skill{s=NPC_NAME_CHANGE} ~onTimer:10 ?hasaura{n=EDIT_AURA}
  - skill{s=NPC_COLOR_CHANGE} ~onTimer:10 ?hasaura{n=EDIT_AURA}

  # INTERACT
  - skill{s=NPC_MERCHANT_BASIC_INTERACT} ~onInteract
  - skill{s=NPC_MERCHANT_BASIC_INTERACT_MENU} ~onInteract

