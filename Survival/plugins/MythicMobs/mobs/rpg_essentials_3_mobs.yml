Healing_Crystal:
  Type: COW
  Display: '&f[&aACTIVE&f]'
  Health: 100
  Damage: 1
  Options:
    MovementSpeed: 0.01
    Collidable: false
    ShowHealth: false
    Invincible: true
    PreventRandomEquipment: true
    AlwaysShowName: false
    Persistent: true
    Despawn: false
    PreventOtherDrops: true
    FollowRange: 1
    Silent: true
    KnockbackResistance: 1
    PreventSunburn: true
