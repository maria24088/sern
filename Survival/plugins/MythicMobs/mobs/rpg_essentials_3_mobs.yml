NPC_Farmer:
  Type: SKELETON
  Display: '&eGranjero'
  Health: 500
  Damage: 1
  # Agrega esta línea aquí para que el modelo cargue con la entidad
  Model: npc_farmer
  Options:
    MovementSpeed: 0
    ShowHealth: false
    PreventRandomEquipment: true
    AlwaysShowName: false
    Despawn: PERSISTENT
    NoGravity: true
    Invincible: true
    Collidable: false
    PreventOtherDrops: true
    FollowRange: 1
    Silent: true
    KnockbackResistance: 1
    PreventSunburn: true
    # Agrega esto para que el esqueleto base sea invisible
    # Así, si el modelo tarda en cargar, no se ve el esqueleto
    Invisible: true 
  DamageModifiers:
  - ENTITY_EXPLOSION 0
  - BLOCK_EXPLOSION 0
  - FALL 0
  - CONTACT 0
  - CRAMMING 0
  - DRAGON_BREATH 0
  - DROWNING 0
  - DRYOUT 0
  - ENTITY_SWEEP_ATTACK 0
  - FALLING_BLOCK 0
  - FIRE 0
  - FIRE_TICK 0
  - FLY_INTO_WALL 0
  - FREEZE 0
  - HOT_FLOOR 0
  - LAVA 0
  - LIGHTNING 0
  - MAGIC 0
  - MELTING 0
  - POISON 0
  - PROJECTILE 0
  - SONIC_BOOM 0
  - STARVATION 0
  - SUFFOCATION 0
  - THORNS 0
  - VOID 0
  - WITHER 0
  - WORLD_BORDER 0
  - KILL 0
  AIGoalSelectors:
  - clear
  - lookatplayers
  AITargetSelectors:
  - clear
  Variables:
    Name: §f§lPardo
    Color: FFFFFF
  Skills:
  - cancelevent{sync=true} ~onAttack
  - cancelevent{sync=true} @self ~onDamaged
  - setvariable{var=caster.spawnx;value=<caster.l.x>;type=FLOAT} @self ~onSpawn
  - setvariable{var=caster.spawny;value=<caster.l.y>;type=FLOAT} @self ~onSpawn
  - setvariable{var=caster.spawnz;value=<caster.l.z>;type=FLOAT} @self ~onSpawn
  - tp @Location{x=<caster.var.spawnx>;y=<caster.var.spawny>;z=<caster.var.spawnz>;delay=2} ~onTimer:2 ?!hasaura{n=EDIT_AURA}
  - look{headOnly=false;immediately=true;f=true;fp=true} @owner ~onTimer:1 ?hasaura{n=EDIT_AURA}
  - tp @Forward{f=2;y=1;ofowner=true} ~onTimer:1 ?hasaura{n=EDIT_AURA}
  - skill{s=NPC_EDIT} ~onInteract
  - skill{s=NPC_SET;rot=65} ~onInteract
  - skill{s=NPC_REMOVE} ~onInteract ?hasaura{n=EDIT_AURA}
  - skill{s=NPC_MODE} ~onTimer:10 ?hasaura{n=EDIT_AURA}
  - skill{s=NPC_NAME_CHANGE} ~onTimer:10 ?hasaura{n=EDIT_AURA}
  - skill{s=NPC_COLOR_CHANGE} ~onTimer:10 ?hasaura{n=EDIT_AURA}

  # Mantenemos esto por seguridad, pero el atributo 'Model' arriba hace el trabajo pesado
  - model{mid=npc_farmer;d=false;n=name} @self ~onSpawn
