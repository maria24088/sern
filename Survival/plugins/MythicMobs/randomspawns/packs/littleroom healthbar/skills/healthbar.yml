HEALTHBAR_ENTITY_detect_sneak:
  Conditions:
  - varequals{var=caster.hide_bar_on_sneak;val=true} true
  Skills:
  - skill{s=HEALTHBAR_ENTITY_detect_sneak_show} @parent
  - skill{s=HEALTHBAR_ENTITY_detect_sneak_hide} @parent
  
HEALTHBAR_ENTITY_detect_sneak_show:
  Conditions:
  - varequals{var=caster.OWNERsneaking;val=false} false
  TargetConditions:
  - ( isplayer && crouching false )
  Skills:
  - setvar{var=caster.OWNERsneaking;val=false;type=STRING} @self
  - command{c="data merge entity @s {text_opacity:255}";ac=true} @self
  
HEALTHBAR_ENTITY_detect_sneak_hide:
  Conditions:
  - varequals{var=caster.OWNERsneaking;val=true} false
  TargetConditions:
  - ( isplayer && crouching true )
  Skills:
  - setvar{var=caster.OWNERsneaking;val=true;type=STRING} @self
  - command{c="data merge entity @s {text_opacity:<caster.var.hide_bar_on_sneak_opacity>}";ac=true} @self
