p_staff_bee_keeper:
  Display: '<b><#FFC863>Bee Keeper Staff'
  Lore:
  - '<gray>12 magic damage'
  - '<gray>15% critical chance'
  - '<gray>Fast speed'
  - '<gray>Average knockback'
  - '<white>Swarm Strike <gold>[RMB]'
  Id: CARROT_ON_A_STICK
  Model: 1001
  Generation: item/bee_keeper_staff
  Skills:
  - skill{skill=[
    - projectile{v=14;hnp=true;hp=true;sB=true;sE=true;i=1;bullettype=MOB;mob=p_staff_bee;bulletmatchdirection=true;bulletyoffset=0;forwardoffset=1;hitself=false;hitconditions=[ - hasTag{tag=prop} false ];maxrange=25;
                onStart=[
                - playAnimation{animation=0} @self{targetCreative=true}
                - sound{s=entity.evoker.cast_spell;p=1.7;v=0.1} @origin
                - sound{sound=block.beehive.exit;p=<random.float.1to2>;v=0.2} @origin
                ];
                onTick=[
                - particles{p=DUST_COLOR_TRANSITION;c1=#FFC863;c2=#3C241B;size=1;a=4;hs=0.05;vs=0.05;speed=0.01} @origin
                ];
                onEnd=[
                - particles{p=BLOCK_CRACK;m=HONEY_BLOCK;a=8;hs=0.05;vs=0.05;speed=0.09} @origin
                - particles{p=POOF;a=2;hs=0.05;vs=0.05;speed=0.09} @origin
                - sound{sound=entity.bee.death;p=<random.float.1to2>;v=0.3} @origin
                ];
                onHit=[
                - particles{particle=spell_mob_ambient;a=3;speed=0.6;hs=0.2;vs=0.2;color=#23670D} @origin
                - itemspray{items=STICK;amount=1;d=4;force=0.1;radius=0} @origin
                - potion{type=POISON;duration=60;force=true;level=1}
                - randomskill{skills=
                  [ - damage{a=12} ] 1,
                  [ - damage{a=25} ] 0.15}
                ]} @targetlocation
    ];cd=0.3} @origin ~onUse
