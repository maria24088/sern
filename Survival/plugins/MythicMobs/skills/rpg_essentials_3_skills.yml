# Exp Scrolls #

scroll_common:
  Cooldown: 1
  Skills:
  - consumeslot{slot=HAND;amount=1} @self
  - giveexperiencelevels{a=1} @self
  - effect:sound{s=entity.experience_orb.pickup;volume=1;pitch=1} @self
  
