Summoning_Totem_Activate:
  Cooldown: 25
  Skills:
  - state{s=skill} @self
  - SetModelTag{m=summoning_totem;p=name;tag="&f[&cDEACTIVATED&f]";v=true} @self
  - SetModelTag{m=summoning_totem;p=name;tag="&f[&aACTIVE&f]";v=true;delay=500} @self
  - defaultstate{t=idle;s=idle_cooldown} @self
  - effect:sound{s=entity.wither.spawn;volume=0.55;pitch=0.7} @self
  - summon{type=Summoning_Totem_Circle;amount=<random.1to4>;radius=20;yRadius=0;onSurface=true;repeat=4;repeati=80} @self

  - delay 400
  
  - effect:sound{s=entity.wither.hurt;volume=0.55;pitch=0.7} @self
  - state{s=skill2} @self
  - defaultstate{t=idle;s=idle} @self

