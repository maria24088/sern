SpiderQueen_Roulette:
  Skills:
  - randomskill{skills=SpiderQueen_WebShot 1,SpiderQueen_EyeShot 1}

# --- Opción 1: Telaraña ---
SpiderQueen_WebShot:
  Skills:
  - projectile{v=20;hnp=true;hp=true;sB=true;sE=true;i=1;bulletType=DISPLAY;bulletMaterial=COBWEB;bulletScale="0.7";ty=-0.2;forwardoffset=1;hitself=false;maxrange=25;hitconditions=[ - hasTag{tag=prop} false ];onStart=SpiderQueen_Shot_Start;onTick=SpiderQueen_Web_Tick;onEnd=SpiderQueen_Web_End;onHit=SpiderQueen_Web_Hit} @targetlocation

SpiderQueen_Web_Tick:
  Skills:
  - particles{p=instant_effect;a=5;hs=0.05;vs=0.05;speed=0} @origin
  - particles{p=BLOCK_CRACK;m=COBWEB;a=5;hs=0.05;vs=0.05;speed=0} @origin

SpiderQueen_Web_End:
  Skills:
  - particles{p=instant_effect;a=1;hs=0.15;vs=0.15;speed=0.02} @origin
  - particles{p=BLOCK_CRACK;m=COBWEB;a=12;hs=0.15;vs=0.15} @origin
  - sound{s=block.grass.place;p=<random.float.1to2>;v=0.2} @origin
  - particles{p=REDSTONE;c=#FFFFFF;a=3;hs=0.15;vs=0.15} @origin
  - itemspray{i=COBWEB;a=2;r=0.1;v=0.2} @origin
  - itemspray{i=STRING;a=10;r=0.1;v=0.3} @origin

SpiderQueen_Web_Hit:
  Skills:
  - potion{type=SLOWNESS;duration=60;force=true;level=1}
  - damage{amount="10 * <random.1to2>"}

# --- Opción 2: Ojo de Araña ---
SpiderQueen_EyeShot:
  Skills:
  - projectile{v=20;hnp=true;hp=true;sB=true;sE=true;i=1;bulletType=DISPLAY;bulletMaterial=FERMENTED_SPIDER_EYE;bulletScale="0.7";ty=-0.2;forwardoffset=1;hitself=false;maxrange=25;hitconditions=[ - hasTag{tag=prop} false ];onStart=SpiderQueen_Eye_Start;onTick=SpiderQueen_Eye_Tick;onEnd=SpiderQueen_Eye_End;onHit=SpiderQueen_Eye_Hit} @targetlocation

SpiderQueen_Shot_Start:
  Skills:
  - playAnimation{animation=0} @self{targetCreative=true}
  - sound{s=entity.evoker.cast_spell;p=1.7;v=0.1} @origin

SpiderQueen_Eye_Start:
  Skills:
  - playAnimation{animation=0} @self{targetCreative=true}
  - sound{s=entity.evoker.cast_spell;p=1.7;v=0.1} @origin
  - sound{sound=entity.spider.hurt;p=1.7;v=0.2} @origin

SpiderQueen_Eye_Tick:
  Skills:
  - particles{p=witch;a=4;hs=0.05;vs=0.05;speed=0} @origin
  - particles{p=REDSTONE;c=#660066;a=3;hs=0.15;vs=0.15} @origin

SpiderQueen_Eye_End:
  Skills:
  - particles{p=instant_effect;a=1;hs=0.15;vs=0.15;speed=0.02} @origin
  - sound{sound=entity.spider.death;p=<random.float.1to2>;v=0.2} @origin
  - particles{p=REDSTONE;c=#660066;a=3;hs=0.15;vs=0.15} @origin
  - itemspray{i=SPIDER_EYE;a=2;r=0.1;v=0.2} @origin

SpiderQueen_Eye_Hit:
  Skills:
  - potion{type=POISON;duration=60;force=true;level=1}
  - damage{amount="10 * <random.1to2>"}