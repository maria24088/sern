Thunder_Clap:
  Skills:
  - projectile{v=30;hnp=true;hp=true;sB=true;sE=true;i=1;forwardoffset=1;hitself=false;maxrange=25;bulletScale=1;bullettype=DISPLAY;bulletmaterial=CARROT_ON_A_STICK;bulletmodel=10004;pitch=1.2;yaw=3;hitconditions=[ - hasTag{tag=prop} false ];onStart=Thunder_Clap_Start;onTick=Thunder_Clap_Tick;onEnd=Thunder_Clap_End} @targetlocation

Thunder_Clap_Start:
  Skills:
  - playAnimation{animation=0} @self{targetCreative=true}
  - sound{s=entity.evoker.cast_spell;p=1.7;v=0.1} @origin
  - sound{sound=item.trident.throw;p=<random.float.1to2>;v=0.2} @origin

Thunder_Clap_Tick:
  Skills:
  - particleline{p=DUST_COLOR_TRANSITION;color1=#f0fb3e;color2=#FFFFFF;size=0.5;fromOrigin=true;origin=@projectileforward{f=-3};zigzag=true;zigzags=2;zzo=0.2;syo=<caster.var.syo>;tyo=<caster.var.tyo>} @projectileforward{f=2}

Thunder_Clap_End:
  Skills:
  - randomskill{skills=[ - damage{a=15;pi=true} ] 1,[ - damage{a=30;pi=true} ] 0.07} @entitiesNearOrigin{radius=3.5}
  - particleline{p=DUST_COLOR_TRANSITION;color1=#f0fb3e;color2=#FFFFFF;size=0.5;fromOrigin=true;origin=@origin{yoffset=15;sideOffset=<random.float.-5to5>;forwardOffset=<random.float.-5to5>};zigzag=true;zigzags=10;zzo=0.2} @ProjectileForward{f=0.01}
  - particleline{p=DUST_COLOR_TRANSITION;color1=#f0fb3e;color2=#FFFFFF;size=0.5;fromOrigin=true;origin=@origin{yoffset=15;sideOffset=<random.float.-5to5>;forwardOffset=<random.float.-5to5>};zigzag=true;zigzags=10;zzo=0.2} @ProjectileForward{f=0.01}
  - particleline{p=SPARK;color1=#f0fb3e;color2=#FFFFFF;size=0.5;fromOrigin=true;origin=@origin{yoffset=15;sideOffset=<random.float.-5to5>;forwardOffset=<random.float.-5to5>};zigzag=true;zigzags=10;zzo=0.2} @ProjectileForward{f=0.01}
  - particleline{p=SPARK;color1=#f0fb3e;color2=#FFFFFF;size=0.5;fromOrigin=true;origin=@origin{yoffset=15;sideOffset=<random.float.-5to5>;forwardOffset=<random.float.-5to5>};zigzag=true;zigzags=10;zzo=0.2} @ProjectileForward{f=0.01}
  - particles{p=FLASH;y=2;a=1} @origin
  - particles{p=END_ROD;a=10;hs=0.5;vs=0.5;y=1.2;speed=0.15} @origin
  - particles{p=FIREWORK;a=10;hs=0.5;vs=0.5;y=1.2;speed=0.2} @origin
  - sound{s=entity.firework_rocket.blast_far;p=2.0;v=0.8} @origin