# OBJECTS #


# Storage Chest #

OBJ_STORAGE_CHEST_INTERACT:
  Cooldown: 1
  TriggerConditions:
  - crouching false
  Conditions:
  - hasaura{n=EDIT_AURA} false
  Skills:
  - state{s=open;speed=1} @self
  - sound{sound=block.chest.open;volume=0.7;pitch=0.9} @self
  - sudoskill{s=OBJ_STORAGE_CHEST_INTERACT_COMMAND;cat=true} @trigger
OBJ_STORAGE_CHEST_INTERACT_COMMAND:
  Skills:
  - command{c='enderchest';asCaster=true;asTarget=false;asOp=true}





# Waypoint Gate #

OBJ_WAYPOINT_GATE_INTERACT:
  Cooldown: 1
  TriggerConditions:
  - crouching false
  Conditions:
  - hasaura{n=EDIT_AURA} false
  Skills:
  - sound{sound=block.end_portal_frame.fill;volume=0.7;pitch=0.9} @self
  - sudoskill{s=OBJ_WAYPOINT_GATE_INTERACT_COMMAND;cat=true} @trigger
OBJ_WAYPOINT_GATE_INTERACT_COMMAND:
  Skills:
  - command{c='dm open waypoints';asCaster=true;asTarget=false;asOp=true}

# TOWN WAYPOINT
OBJ_WAYPOINT_GATE_TOWN:
  Skills:
  - skill{s=OBJ_WAYPOINT_GATE_TOWN_SKILL;world=medieval2;positionx=1640.494;positiony=66;positionz=-773.373}
OBJ_WAYPOINT_GATE_TOWN_SKILL:
  Skills:
  - potion{type=SLOW;duration=60;level=50;hasParticles=false;ow=true} @self
  - message{m="&f&lTeleporting to &b&lTown &f&lin 3 seconds..."} @self
  - sound{sound=block.portal.trigger;volume=0.8;pitch=1.25} @self
  - delay 20
  - skill{s=OBJ_WAYPOINT_CANCELLED} ?moving
  - cancelSkill ?moving
  - delay 10
  - skill{s=OBJ_WAYPOINT_CANCELLED} ?moving
  - cancelSkill ?moving
  - delay 10
  - skill{s=OBJ_WAYPOINT_CANCELLED} ?moving
  - cancelSkill ?moving
  - delay 10
  - skill{s=OBJ_WAYPOINT_CANCELLED} ?moving
  - cancelSkill ?moving
  - delay 10
  - skill{s=OBJ_WAYPOINT_CANCELLED} ?moving
  - cancelSkill ?moving
  - particles{p=portal;amount=20;hS=0.3;vS=0.7;y=0.7;size=1;speed=0} @self
  - delay 1
  - teleportto{world=<skill.world>;location=<skill.positionx>,<skill.positiony>,<skill.positionz>} @self
  - sound{sound=entity.fox.teleport;volume=0.8;pitch=0.9} @self
  - particles{p=portal;amount=20;hS=0.3;vS=0.7;y=0.7;size=1;speed=0;delay=1} @self

