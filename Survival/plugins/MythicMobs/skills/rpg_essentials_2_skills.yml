Waystone_1:
  TriggerConditions:
  - crouching false
  - variableEquals{var=target.waypoint_1;value="unlocked"} false
  Cooldown: 1
  Skills:
  - setvariable{var=target.waypoint_1;value="unlocked";type=STRING;delay=1}
  - effect:sound{s=item.trident.thunder;volume=1;pitch=0.9}
  - command{c="mmocore waypoints unlock waypoint_1 <trigger.name>";asOp=false}
  - sendtitle{title="&eWaystone Unlocked!";subtitle="&6Waypoint 1";d=40;fi=10;fo=10}
  
Waystone_1_Lastinteract:
  TriggerConditions:
  - crouching false
  - variableEquals{var=target.waypoint_1;value="unlocked"} cast Waystone_1_Lastinteract_Message
  Cooldown: 1
  Skills:
  - setvariable{var=target.lastinteracted;value="waypoint_1";type=STRING;delay=1}
  
Waystone_1_Lastinteract_Message:
  Skills:
  - sendtitle{title="&eReturn Waypoint Set!";subtitle="&6Waypoint 1";d=40;fi=10;fo=10}
  - effect:sound{s=entity.experience_orb.pickup;volume=1;pitch=1}
  
Scroll_Return_Waypoint_1:
  Cooldown: 1
  Skills:
  - effect:sound{s=entity.enderman.teleport;volume=1;pitch=0.8} @self
  - command{c="mmocore waypoints teleport waypoint_1 <caster.name>";asOp=false}
  - sendtitle{title="";subtitle="&eTeleporting...";d=40;fi=10;fo=10} @self
  
  
