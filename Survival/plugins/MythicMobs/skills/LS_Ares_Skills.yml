#Shield
Retribution:
  Cooldown: 60
  Skills:
  - onDamaged{auraName=Retribution;onStart=Retribution-Start;onTick=Retribution-Tick;onEnd=Retribution-End;bt=true;msc=true;cogd=true} @self
Retribution-Start:
  Skills:
  - msg{m="<red>My Retribution has begun..."}
Retribution-Tick:
  Skills:
  - particles{particle=flame;a=5;hs=0.5;vs=0.5;y=0.5;s=0.1125} @self
Retribution-End:
  Skills:
  - damage{a=<skill.var.damage-amount>} @EIR{r=20}
  - msg{m="<red>You've completed your retribution!"} @self
ShieldBash:
  Cooldown: 10
  Skills:
  - lunge{velocity=5;velocityY=-1} @self
  - damage{a=4} @LINE{r=1-3;fo=true}
#Sword
Leadership:
  Cooldown: 30
  Skills:
  - summon{t=AresMinion;a=1-3;r=5;os=true;ctt=true;itt=true} @self
  - effect:sound{s=item.goat_horn.sound.0;v=1;p=1} @self
  - effect:particleorbital{r=2;points=8;t=100;i=1;vy=20;particle=flame} @caster

Grandiose:
  Cooldown: 120
  Skills:
  - summon{t=AresSword;a=1;ctt=true;itt=true} @self
  - effect:sound{s=item.trident.hit_ground;v=1;p=0.2} @self
  - effect:sound{s=item.trident.hit_ground;v=1;p=0.5;delay=30} @self
  - recoil{r=1;pitch=-1to-1} @EIR{r=10;ignore=self}

