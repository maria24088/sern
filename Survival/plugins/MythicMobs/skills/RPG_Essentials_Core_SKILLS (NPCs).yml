# HEALING FAIRY

NPC_HEALING_FAIRY_INTERACT:
  Cooldown: 2
  Conditions:
  - hasaura{n=EDIT_AURA} false
  TriggerConditions:
  - crouching false
  Skills:
  - state{s=interact;lo=10;speed=1} @self
  - effect:sound{s=entity.allay.ambient_without_item;volume=0.8;pitch=1.3} @self
