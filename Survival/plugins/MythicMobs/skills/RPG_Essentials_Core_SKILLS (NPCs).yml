  - skill{s=NPC_BANKER_COIN_TO_STACKED_COIN_SKILL_INVX}
NPC_BANKER_COIN_TO_STACKED_COIN_SKILL_INVX:
  Conditions:
  - hasinventoryspace castinstead NPC_BANKER_COIN_TO_STACKED_COIN_SKILL_ALLO
  Skills:
  - message{m="&4You don't have enough space in your inventory!"} @self
  - sound{sound=entity.item.break;volume=0.8;pitch=0.9} @self
