  - skill{s=NPC_MERCHANT_ITEMX} ?!hascurrency{a=50}
  - skill{s=NPC_MERCHANT_BUY;price=50;item=ENCHANTED_GOLDEN_APPLE;itemname="Enchanted Golden Apple"} ?hascurrency{a=50}
NPC_MERCHANT_BASIC_SELL_1:
  Skills:
  - skill{s=NPC_MERCHANT_ITEMX} ?!hasitem{i=ENCHANTED_GOLDEN_APPLE;amount=>0}
  - skill{s=NPC_MERCHANT_SELL;sellprice=25;itemname="Enchanted Golden Apple"} ?hasitem{i=ENCHANTED_GOLDEN_APPLE;amount=>0}
  - takeitem{i=ENCHANTED_GOLDEN_APPLE;a=1} @self ?hasitem{i=ENCHANTED_GOLDEN_APPLE;amount=>0}

NPC_MERCHANT_BASIC_BUY_2:
