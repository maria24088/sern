  #heal
  - heal{a=99999} @trigger
  - particles{p=totem;amount=30;hS=0.2;vS=0.75;y=0.7;size=1;speed=0} @trigger
  - effect:sound{s=block.trial_spawner.spawn_item_begin;volume=1;pitch=1.2} @trigger


