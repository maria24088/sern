# NPCs #


# MERCHANTS

NPC_MERCHANT_INVX:
  Skills:
  - message{m="&4You don't have enough space in your inventory!"} @self
  - sound{sound=entity.item.break;volume=0.8;pitch=0.9} @self
NPC_MERCHANT_ITEMX:
  Skills:
  - message{m="&4Requirements not met!"} @self
  - sound{sound=entity.item.break;volume=0.8;pitch=0.9} @self

# ITEM
NPC_MERCHANT_BUY:
  Conditions:
  - hasinventoryspace orelsecast NPC_MERCHANT_INVX
  Skills:
  - sound{sound=entity.experience_orb.pickup;volume=0.8;pitch=1.4} @self
  - sound{sound=item.armor.equip_netherite;volume=1;pitch=1.5} @self
  - takecurrency{a=<skill.price>} @self
  - delay 1
  - giveitem{i=<skill.item> 1} @self
  - message{m="&fSuccessfully purchased &a1x <skill.itemname> &ffor &c$<skill.price>!"} @self
NPC_MERCHANT_SELL:
  Skills:
  - sound{sound=entity.experience_orb.pickup;volume=0.8;pitch=1.4} @self
  - sound{sound=item.armor.equip_netherite;volume=1;pitch=1.5} @self
  - givecurrency{a=<skill.sellprice>} @self
  - message{m="&fSuccessfully sold &c1x <skill.itemname> &ffor &a$<skill.sellprice>!"} @self

# PERMISSION NODE
NPC_MERCHANT_PERMISSION_BUY:
  Skills:
  - sound{sound=entity.experience_orb.pickup;volume=0.8;pitch=1.4} @self
  - sound{sound=item.armor.equip_netherite;volume=1;pitch=1.5} @self
  - takecurrency{a=<skill.price>} @self
  - delay 1
  - command{c='lp user %player_name% permission set <skill.permission> true';asCaster=true;asTarget=false;asOp=true} @self
  - message{m="&fSuccessfully purchased &a1x <skill.itemname> &ffor &c$<skill.price>!"} @self



# MERCHANT - BASIC

NPC_MERCHANT_BASIC_INTERACT:
  Cooldown: 5
  Conditions:
  - hasaura{n=EDIT_AURA} false
  TriggerConditions:
  - crouching false
  Skills:
  - state{s=interact;lo=10;speed=1} @self
  - delay 14
  #bow
  - sound{sound=entity.villager.ambient;volume=0.8;pitch=<random.float.1.3to1.4>} @self
NPC_MERCHANT_BASIC_INTERACT_MENU:
  Cooldown: 1
  TriggerConditions:
  - crouching false
  Skills:
  - sudoskill{s=NPC_MERCHANT_BASIC_INTERACT_COMMAND;cat=true} @trigger
NPC_MERCHANT_BASIC_INTERACT_COMMAND:
  Skills:
  - command{c='dm open merchant_basic';asCaster=true;asTarget=false;asOp=true}

# MERCHANT - BASIC (ITEMS)

NPC_MERCHANT_BASIC_BUY_1:
