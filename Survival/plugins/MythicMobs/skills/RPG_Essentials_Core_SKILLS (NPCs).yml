  Skills:
  - sound{sound=entity.experience_orb.pickup;volume=0.8;pitch=1.4} @self
  - sound{sound=item.armor.equip_netherite;volume=1;pitch=1.5} @self
  - command{c="mi take MISCELLANEOUS COIN %player_name% 64"} @self
  - delay 1
  - command{c="mi give MISCELLANEOUS STACKED_COIN %player_name% 1 0 100 0 silent"} @self
  - message{m="&fSuccessfully converted &c64x Coin &fto &a1x Stacked Coin!"} @self



