commands:
  prefix: '<dark_gray>[<aqua>Skills<dark_gray>]<reset> '
  armor:
    modifier:
      add:
        added: 'Añadido modificador a armadura: {stat}, valor: {value}, operación: {operation}'
        already_exists: '<yellow>¡Un modificador de {color}{stat} <yellow>ya existe! Quítalo con /sk armor modifier remove'
        lore: '<gray>{stat}: {color}+{value}'
        lore_subtract: '<gray>{stat}: {color}-{value}'
        desc: Añade un modificador de estadística a la armadura sostenida.
      remove:
        does_not_exist: '<yellow>¡Tu item no tiene el modificador {color}{stat}<yellow>!'
        removed: '{color}{stat} <gray>modificador eliminado de tu item'
        desc: Elimina un modificador de estadística de la armadura sostenida.
      list:
        header: '<white>Modificadores encontrados:'
        entry: '  {color}{stat}<white> - {value}'
        desc: Lista los modificadores de la armadura sostenida.
      removeall:
        removed: '<gray>Todos los modificadores eliminados de tu item'
        desc: Elimina todos los modificadores de la armadura sostenida.
    multiplier:
      add:
        added: '<aqua>{target} <gray>multiplicador con valor <aqua>{value} <gray>añadido'
        already_exists: '<yellow>¡Ya existe un multiplicador para <aqua>{target}!<yellow> Quítalo primero.'
        skill_lore: '<gray>Al usar: <aqua>+{value}% XP de {skill}'
        skill_lore_subtract: '<gray>Al usar: <aqua>-{value}% XP de {skill}'
        global_lore: '<gray>Al usar: <blue>+{value}% XP de Habilidad'
        global_lore_subtract: '<gray>Al usar: <blue>-{value}% XP de Habilidad'
        desc: Añade un multiplicador de armadura al item sostenido.
      remove:
        does_not_exist: '<yellow>¡No hay multiplicador de <aqua>{target} <yellow>en este item!'
        removed: '<aqua>{target} <gray>multiplicador eliminado'
        desc: Elimina un multiplicador del item sostenido.
      list:
        header: '<white>Multiplicadores encontrados:'
        entry: '  <aqua>{target}<white> - {value}'
        desc: Lista los multiplicadores en el item.
      removeall:
        removed: '<gray>Todos los multiplicadores eliminados'
        desc: Elimina todos los multiplicadores del item.
    requirement:
      add:
        added: '<dark_aqua>{skill}<gray> requisito de nivel <aqua>{level}<gray> añadido'
        already_exists: '<yellow>¡Ya existe un requisito de <dark_aqua>{skill}<yellow>!'
        lore: '<red>Requiere <dark_aqua>{skill} {level}'
        desc: Añade un requisito de armadura al item.
      remove:
        does_not_exist: '<yellow>¡No existe requisito de <dark_aqua>{skill}<yellow>!'
        removed: '<dark_aqua>{skill}<gray> requisito eliminado'
        desc: Elimina un requisito del item.
      list:
        header: '<white>Requisitos encontrados:'
        entry: '  <dark_aqua>{skill} <white>- <aqua>{level}'
        desc: Lista los requisitos del item.
      removeall:
        removed: '<gray>Todos los requisitos eliminados'
        desc: Elimina todos los requisitos del item.
      equip: '<yellow>No cumples los requisitos para equipar esto: {requirements}'
      entry: '<aqua>{skill} {level}<gray>, '
    trait:
      add:
        added: 'Añadido rasgo a armadura: {trait}, valor: {value}, op: {operation}'
        already_exists: '<yellow>¡El rasgo {trait} <yellow>ya existe en tu item!'
        desc: Añade un rasgo modificador a la armadura.
      remove:
        desc: Elimina un rasgo modificador.
      list:
        desc: Lista los rasgos modificadores.
      removeall:
        desc: Elimina todos los rasgos.
