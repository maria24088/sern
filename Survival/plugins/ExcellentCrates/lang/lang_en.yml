Command:
  Argument:
    Name:
      Crate: crate
      Key: key
      X: x
      Y: y
      Z: z
  Editor:
    Desc: Open editor GUI.
  Drop:
    Desc: Spawn crate item in the world.
    Done: <gray>Dropped <soft_yellow>%crate_name%</soft_yellow> at <soft_yellow>%location_x%, %location_y%, %location_z%</soft_yellow> in <soft_yellow>%location_world%</soft_yellow>.</gray>
  DropKey:
    Desc: Spawn key item in the world.
    Done: <gray>Dropped <soft_yellow>%key_name%</soft_yellow> at <soft_yellow>%location_x%, %location_y%, %location_z%</soft_yellow> in <soft_yellow>%location_world%</soft_yellow>.</gray>
  Open:
    Desc: Open a crate.
  OpenFor:
    Desc: Open crate for a player.
    Done: <gray>Opened <soft_yellow>%crate_name%</soft_yellow> for <soft_yellow>%player_name%</soft_yellow>.</gray>
    Notify: <gray>You have been forced to open <soft_yellow>%crate_name%</soft_yellow>.</gray>
  Give:
    Desc: Gives crate to a player.
    Done: <gray>Given <soft_yellow>x%amount%</soft_yellow> of <soft_yellow>%crate_name%</soft_yellow> crate(s) to <soft_yellow>%player_name%</soft_yellow>.</gray>
    Notify: <gray>You recieved <soft_yellow>x%amount%</soft_yellow> of <soft_yellow>%crate_name%</soft_yellow>.</gray>
  Key:
    Desc: Manage player's keys.
    Give:
      Desc: Give key to a player.
      Done: <gray>Given <soft_yellow>x%amount%</soft_yellow> of <soft_yellow>%key_name%</soft_yellow> key(s) to <soft_yellow>%player_name%</soft_yellow>.</gray>
      Notify: <gray>You recieved <soft_yellow>x%amount%</soft_yellow> of <soft_yellow>%key_name%</soft_yellow>!</gray>
    Take:
      Desc: Take key from a player.
      Done: <gray>Taken <soft_yellow>x%amount%</soft_yellow> of <soft_yellow>%key_name%</soft_yellow> key(s) from <soft_yellow>%player_name%</soft_yellow>.</gray>
      Notify: <gray>You lost <soft_red>x%amount%</soft_red> <soft_red>%key_name%</soft_red>.</gray>
    Set:
      Desc: Set keys amount for a player.
      Done: <gray>Set <soft_yellow>x%amount%</soft_yellow> of <soft_yellow>%key_name%</soft_yellow> key(s) for <soft_yellow>%player_name%</soft_yellow>.</gray>
      Notify: <gray>Your <soft_yellow>%key_name%</soft_yellow>'s amount has been changed to <soft_yellow>x%amount%</soft_yellow>.</gray>
    Show:
      Desc: Inspect [player's] virtual keys.
      Format:
        List:
        - '[prefix="false"]'
        - ' '
        - '<soft_yellow><b>%player_name%''s Virtual Keys: </b></soft_yellow>'
        - '%entry%'
        - ' '
        Entry: '<soft_yellow>▪ <gray>%key_name%: </gray>x%amount%</soft_yellow>'
    GiveAll:
      Desc: Give key to all online players.
      Done: <gray>Given <soft_yellow>x%amount%</soft_yellow> of <soft_yellow>%key_name%</soft_yellow> key(s) to <soft_yellow>All Players</soft_yellow>.</gray>
  Preview:
    Desc: Open crate preview.
    Done:
      Others: <gray>Opened <soft_yellow>%crate_name%</soft_yellow> preview for <soft_yellow>%player_display_name%</soft_yellow>.</gray>
  ResetCooldown:
    Desc: Reset player's crate open cooldown.
    Done: <gray>Reset <soft_yellow>%player_name%</soft_yellow>'s open cooldown for <soft_yellow>%crate_name%</soft_yellow>.</gray>
  Menu:
    Desc: Open crate menu.
    Done:
      Others: <gray>Opened crates menu for <soft_yellow>%player_display_name%</soft_yellow>.</gray>
Error:
  Command:
    Argument:
      InvalidCrate: <gray><soft_red>%value%</soft_red> is not a valid crate!</gray>
      InvalidKey: <gray><soft_red>%value%</soft_red> is not a valid key!</gray>
  DataIsLoading: <soft_red>Data is still loading... Please try again later.</soft_red>
Crate:
  Open:
    Error:
      InventorySpace:
      - '[sound="minecraft:entity.villager.no;0.8;1.0",title_times="20:60:20",type="title"]'
      - <soft_red><b>Inventory is Full!</b></soft_red>
      - <gray>Clean up inventory to open crates.</gray>
      Cooldown:
        Temporary:
        - '[sound="minecraft:entity.villager.no;0.8;1.0",title_times="20:60:20",type="title"]'
        - <soft_red><b>Crate is on Cooldown!</b></soft_red>
        - <gray>You can open it again in <soft_red>%time%</soft_red></gray>
        OneTimed:
        - '[sound="minecraft:entity.villager.no;0.8;1.0",title_times="20:60:20",type="title"]'
        - <soft_red><b>Whoops!</b></soft_red>
        - <gray>You already have opened this one-timed crate!</gray>
      NoRewards:
      - '[sound="minecraft:entity.villager.no;0.8;1.0",title_times="20:60:20",type="title"]'
      - <red><b>Whoops!</b></red>
      - <gray>There are no rewards for you! Try later.</gray>
      Already:
      - '[sound="minecraft:entity.villager.no;0.8;1.0",title_times="20:60:20",type="title"]'
      - <red><b>Whoops!</b></red>
      - <gray>You're already opening a crate!</gray>
    TooExpensive:
    - '[prefix="false"]'
    - ' '
    - <red><b>CRATE NOT OPENED:</b></red>
    - '<red>» </red><gray>Crate: </gray><white>%crate_name%</white>'
    - '<red>» </red><gray>You can''t afford the open cost: %costs%</gray>'
    - ' '
    Milestone:
      Completed: '[sound="minecraft:entity.player.levelup;0.8;1.0",prefix="false"]<gray>You completed <green>%milestone_openings% Openings </green>milestone and got <green>%reward_name%</green> as reward!</gray>'
    Reward:
      Broadcast:
      - '[sound="minecraft:block.note_block.bell;0.8;1.0",prefix="false"]'
      - ' '
      - <gray><light_purple>%player_display_name%</light_purple> opened <light_purple>%crate_name%</light_purple> and received <light_purple>%reward_name%</light_purple>!</gray>
      - ' '
      - '<gray>Purchase keys: <click:open_url:"https://YOUR_LINK_HERE.xyz"><light_purple>[Click to open Store]</light_purple></click></gray>'
      - ' '
  Rewards:
  - '[prefix="false"]'
  - ' '
  - <yellow><b>CRATE OPENED:</b></yellow>
  - '<yellow>» </yellow><gray>Crate: </gray><white>%crate_name%</white>'
  - '<yellow>» </yellow><gray>Rewards: </gray><white>%rewards%</white>'
  - ' '
  Opened:
    Result:
      Reward: '%reward_name%'
  Preview:
    Error:
      Cooldown: <gray>You can preview this crate again in <soft_red>%time%</soft_red></gray>
Other:
  Cooldown:
    Ready: <green>Ready to Open!</green>
  LastOpener:
    Empty: '-'
  LastReward:
    Empty: '-'
  NextMilestone:
    Empty: '-'
  Midnight: Midnight
  Free: Free
EffectModel:
  None: None
  Helix: Helix
  Spiral: Spiral
  Sphere: Sphere
  Heart: Heart
  Pulsar: Pulsar
  Beacon: Beacon
  Tornado: Tornado
  Vortex: Vortex
  Simple: Simple
Inspections:
  Generic:
    Overview:
      onTrue: No problems detected.
      onFalse: Problems detected!
    Item:
      onTrue: Item is valid.
      onFalse: Item is invalid!
    Commands:
      onTrue: All commands are valid.
      onFalse: Detected invalid commands!
  Crate:
    Preview:
      onTrue: Preview is valid.
      onFalse: Preview is invalid!
    Opening:
      onTrue: Opening is valid.
      onFalse: Opening is invalid!
    Hologram:
      onTrue: Hologram template is valid.
      onFalse: Hologram template is invalid!
  Reward:
    Preview:
      onTrue: Preview item is valid.
      onFalse: Preview item is invalid!
    Items:
      onTrue: All items are valid.
      onFalse: Detected invalid items!
    NoItems: No items added.
    NoCommands: No commands defined.
UI:
  Costs:
    Option:
      Available:
        Name: <white>%cost_name%</white>
        Lore:
        - '%costs%'
        - '%empty-if-above%'
        - '<yellow><b>OPENINGS AVAILABLE: </b></yellow><white><u>%available%</u></white>'
        - ''
        - <green>→ <u>Click to select</u></green>
      Unavailable:
        Name: <white>%cost_name%</white>
        Lore:
        - '%costs%'
        - '%empty-if-above%'
        - <red><b>YOU CAN'T AFFORD THIS</b></red>
    Entry0:
      Available: <white>%entry%</white> <gray>(<green>✔</green>)</gray>
      Unavailable: <white>%entry%</white> <gray>(<red>✘</red>)</gray>
  OpenAmount:
    Single:
      Name: <yellow><b>Open One</b></yellow>
      Lore:
      - <gray>Open a single crate.</gray>
      - ''
      - <yellow>→ <u>Click to select</u></yellow>
    All:
      Name: <yellow><b>Open All</b></yellow>
      Lore:
      - <gray>Open up to <white>%max%</white> crates.</gray>
      - ''
      - <yellow>→ <u>Click to select</u></yellow>
Editor:
  Title:
    Main: <black>ExcellentCrates Editor</black>
    Crates: <black>Crates Editor</black>
    Crate:
      Settings: <black>Crate Settings</black>
      CostOptions: <black>Cost Options</black>
      CostOption: <black>Cost Option Settings</black>
      Milestones: <black>Crate Milestones</black>
    Reward:
      List: <black>Crate Rewards</black>
      Content: <black>Reward Items</black>
      Settings: <black>Reward Settings</black>
    Keys: <black>Keys Editor</black>
    Key:
      Settings: <black>Key Settings</black>
  Enter:
    Amount: <gray>Enter <green>[Amount]</green></gray>
  Reward:
    Enter:
      Id: <gray>Enter <green>[Reward Identifier]</green></gray>
  Button:
    Main:
      Crates:
        Name: <green><b>Crates</b></green>
        Lore:
        - <gray>There are <green>%amount%</green> crates created.</gray>
        - ' '
        - <green>→ <u>Click to open</u></green>
      Keys:
        Name: <gold><b>Keys</b></gold>
        Lore:
        - <gray>There are <gold>%amount%</gold> keys created.</gray>
        - ' '
        - <gold>→ <u>Click to open</u></gold>
    Crates:
      Crate:
        Name: '%crate_name%'
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>ID: <white>%crate_id%</white></gray>'
        - ' '
        - <soft_yellow>→ <u>Click to open</u></soft_yellow>
      Create:
        Name: <green><b>New Crate</b></green>
        Lore:
        - <gray>Use this button to create</gray>
        - <gray>brand new crates!</gray>
        - ' '
        - <green>→ <u>Click to create</u></green>
    Crate:
      Delete:
        Name: <red><b>Delete Crate</b></red>
        Lore:
        - <gray>Permanently deletes the crate.</gray>
        - ' '
        - <red>→ <u>Press [<key:key.drop>] to delete</u></red>
      DisplayName:
        Name: <soft_yellow><b>Name</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Current: <white>%crate_name%</white></gray>'
        - ' '
        - <gray>Sets crate display name.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to change</u></soft_yellow>
      Description:
        Name: <soft_yellow><b>Description</b></soft_yellow>
        Lore:
        - '%crate_description%'
        - '%empty-if-above%'
        - <gray>Sets crate description.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to edit</u></soft_yellow>
      Item:
        Name: <soft_yellow><b>Crate Item</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Stackable: <white>%state%</white></gray>'
        - ' '
        - <gray>Drop an item on <soft_yellow>this</soft_yellow> button</gray>
        - <gray>to replace the crate's item.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to toggle stacking</u></soft_yellow>
      Preview:
        Set:
          Name: <soft_yellow><b>Preview GUI</b></soft_yellow>
          Lore:
          - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
          - '<gray><dark_gray>» </dark_gray>Preview ID: <white>%value%</white></gray>'
          - ' '
          - <gray>Sets preview GUI for the crate.</gray>
          - ' '
          - <soft_yellow>→ <u>Click to change</u></soft_yellow>
        Unset:
          Name: <soft_yellow><b>Preview GUI</b></soft_yellow>
          Lore:
          - '<gray><dark_gray>» </dark_gray>Status: <white><red>Disabled</red></white></gray>'
          - ' '
          - <gray>Sets preview GUI for this crate.</gray>
          - ' '
          - <soft_yellow>→ <u>Click to change</u></soft_yellow>
      Opening:
        Set:
          Name: <soft_yellow><b>Opening Animation</b></soft_yellow>
          Lore:
          - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
          - '<gray><dark_gray>» </dark_gray>Preview ID: <white>%value%</white></gray>'
          - ' '
          - <gray>Sets opening animation for the crate.</gray>
          - ' '
          - <soft_yellow>→ <u>Click to change</u></soft_yellow>
        Unset:
          Name: <soft_yellow><b>Opening Animation</b></soft_yellow>
          Lore:
          - '<gray><dark_gray>» </dark_gray>Status: <white><red>Disabled</red></white></gray>'
          - ' '
          - <gray>Sets opening animation for the crate.</gray>
          - ' '
          - <soft_yellow>→ <u>Click to change</u></soft_yellow>
      LinkedBlocks:
        Name: <soft_yellow><b>Linked Block</b></soft_yellow>
        Lore:
        - <dark_gray>Press <gold>[<key:key.drop>]</gold> to unlink.</dark_gray>
        - ' '
        - '<gray><dark_gray>» </dark_gray>Linked: <white>%state%</white></gray>'
        - ' '
        - <gray>Link the crate to a block by</gray>
        - <gray>using the link tool.</gray>
        - ' '
        - <gray>Interacting with the linked block</gray>
        - <gray>will preview and open the crate.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to get link tool</u></soft_yellow>
      BlockPushback:
        Name: <soft_yellow><b>Block Pushback</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%state%</white></gray>'
        - ' '
        - <gray>Pushes players back from the crate</gray>
        - <gray>if they don't met the requirements.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to toggle</u></soft_yellow>
      CostOptions:
        Name: <soft_yellow><b>Cost Options</b></soft_yellow>
        Lore:
        - <gray>Here you can set the <soft_yellow>'cost'</soft_yellow></gray>
        - <gray>required to open the crate - </gray>
        - <gray>it can be <soft_yellow>keys</soft_yellow>, <soft_yellow>currency</soft_yellow>, or both.</gray>
        - ' '
        - <gray>You can add multiple cost options,</gray>
        - <gray>allowing players to choose how</gray>
        - <gray>they want to open the crate.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to open</u></soft_yellow>
      Permission:
        Name: <soft_yellow><b>Permission Requirement</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%state%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Permission: <white>%value%</white></gray>'
        - ' '
        - <gray>Controls whether permission is</gray>
        - <gray>required to open the crate.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to toggle</u></soft_yellow>
      OpeningCooldown:
        Name: <soft_yellow><b>Open Limits</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%state%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Cooldown: <white>%value%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Limit Amount: <white>%amount%</white></gray>'
        - ' '
        - <gray>Limits amount of crates</gray>
        - <gray>can be opened per player</gray>
        - <gray>for a time frame.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to edit</u></soft_yellow>
      Effect:
        Name: <soft_yellow><b>Crate Effect</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Model: <white>%type%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Particle: <white>%value%</white></gray>'
        - ' '
        - <gray>Sets effect for the crate block(s).</gray>
        - ' '
        - <soft_yellow>→ <u>Click to edit</u></soft_yellow>
      Hologram:
        Name: <soft_yellow><b>Crate Hologram</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>State: <white>%state%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Template: <white>%value%</white></gray>'
        - ' '
        - <gray>Auto-manageable hologram above</gray>
        - <gray>the linked crate block.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to edit</u></soft_yellow>
      Rewards:
        Name: <soft_yellow><b>Rewards</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Rewards: <white>%amount%</white></gray>'
        - ' '
        - <gray>Add and manage crate's rewards!</gray>
        - ' '
        - <soft_yellow>→ <u>Click to open</u></soft_yellow>
      Milestones:
        Name: <soft_yellow><b>Milestones</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Milestones: <white>%amount%</white></gray>'
        - ' '
        - <gray>Create custom milestones with</gray>
        - <gray>rewards for the crate!</gray>
        - ' '
        - <soft_yellow>→ <u>Click to open</u></soft_yellow>
      Post-Open-Commands:
        Name: <soft_yellow><b>Post-Open Commands</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Commands: <white>%amount%</white></gray>'
        - ' '
        - <gray>Runs listed commands</gray>
        - <gray>when the crate is opened.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to edit</u></soft_yellow>
    Milestone:
      Create:
        Name: <soft_yellow><b>New Milestone</b></soft_yellow>
        Lore: []
      Object:
        Name: '<soft_yellow><b>Milestone: %milestone_openings%</b></soft_yellow>'
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Openings: <white>%milestone_openings%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Reward Id: <white>%milestone_reward_id%</white></gray>'
        - ' '
        - <soft_yellow>→ <u>Left-Click to change openings</u></soft_yellow>
        - <soft_yellow>→ <u>Right-Click tochange reward</u></soft_yellow>
        - <soft_yellow>→ <u>Shift-Right delete <soft_red>(no undo)</soft_red></u></soft_yellow>
    Rewards:
      Reward:
        Name: '%reward_name%'
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>ID: <white>%reward_id%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Weight: <white>%reward_weight% → <green>%reward_roll_chance%%</green></white></gray>'
        - '<gray><dark_gray>» </dark_gray>Rarity: <white>%reward_rarity_name% → <green>%reward_rarity_roll_chance%%</green></white></gray>'
        - ' '
        - <soft_yellow>→ <u>Click to edit</u></soft_yellow>
      Creation:
        Name: <green><b>Reward Creation</b></green>
        Lore:
        - <gray>Drop item on <green>this</green> button</gray>
        - <gray>to create a new reward of it.</gray>
      Sorting:
        Name: <soft_yellow><b>Sort Rewards</b></soft_yellow>
        Lore:
        - <gray>Automatically sorts rewards in</gray>
        - <gray>certain order.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to open</u></soft_yellow>
      MassMode:
        Name: <soft_yellow><b>Mass Creation Mode</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%state%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Reward Type: <white>%type%</white></gray>'
        - ' '
        - <gray>Allows you to quickly add</gray>
        - <gray>multiple rewards to the crate</gray>
        - <gray>by clicking on items in</gray>
        - <gray>your inventory.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to toggle mode</u></soft_yellow>
        - <soft_yellow>→ <u>Click to toggle type</u></soft_yellow>
      ArrangeMode:
        Name: <soft_yellow><b>Arrange Mode</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%state%</white></gray>'
        - ' '
        - <gray>Allows you to arrange rewards by</gray>
        - <gray>shifting them left or right.</gray>
        - ' '
        - <gray>Use the <soft_yellow>Left-Click</soft_yellow> to shift left,</gray>
        - <gray>and the <soft_yellow>Right-Click</soft_yellow> to shift right.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to toggle</u></soft_yellow>
    Reward:
      Items:
        Name: <soft_yellow><b>Items to Give</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Items: <white>%amount%</white></gray>'
        - ' '
        - <gray>Gives listed items when won.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to open</u></soft_yellow>
      Commands:
        Name: <soft_yellow><b>Commands to Run</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Commands: <white>%amount%</white></gray>'
        - ' '
        - <gray>Runs listed commands when won.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to edit</u></soft_yellow>
      PreviewNormal:
        Name: <soft_yellow><b>Preview Item</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - ' '
        - <gray>Drop an item on <soft_yellow>this</soft_yellow> button</gray>
        - <gray>to replace the reward preview.</gray>
      PreviewCustom:
        Name: <soft_yellow><b>Preview Item</b></soft_yellow>
        Lore:
        - '<gray><dark_gray>» </dark_gray>Status: <white>%inspection%</white></gray>'
        - '<gray><dark_gray>» </dark_gray>Use Custom: <white>%state%</white></gray>'
        - ' '
        - <gray>Drop an item on <soft_yellow>this</soft_yellow> button</gray>
        - <gray>to replace the reward preview.</gray>
        - ' '
        - <soft_yellow>→ <u>Click to toggle custom usage</u></soft_yellow>
      RarityWeight:
