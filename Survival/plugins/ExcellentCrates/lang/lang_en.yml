      Title: <yellow><b>CRATE</b></yellow><dark_gray> » </dark_gray><white>Opening Limits</white>
      Body:
        Contents:
        - Here you can set the crate opening limits per player.
        - ''
        - <soft_yellow>Cooldown</soft_yellow> sets the time period (in seconds) during which a player can open the crate the number of times specified in <soft_yellow>Amount</soft_yellow>.
        - ''
        - When this time period expires, the player's crate opening counter is reset, making the crate available again.
        - ''
        - The cooldown timer is activated with the first crate opened after the counter is reset.
        - ''
        - <soft_yellow>→</soft_yellow> To make the crate one-timed (never reset), set <soft_yellow>Cooldown</soft_yellow> to <soft_yellow>-1</soft_yellow>.
        - ''
        - <soft_yellow>→</soft_yellow> To disable this feature, uncheck the <soft_yellow>Enabled</soft_yellow> box.
