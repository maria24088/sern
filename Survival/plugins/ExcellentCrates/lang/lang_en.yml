Dialog:
  Generic:
    Creation:
      Body:
        Contents:
        - Enter a <soft_yellow>unique identifier</soft_yellow> (ID) for the new object.
        - ''
        - <soft_orange>⚠</soft_orange> You will need to reference this ID in <soft_orange>commands</soft_orange> and <soft_orange>config files</soft_orange>, so it's best to choose one that's <soft_orange>clear</soft_orange> and <soft_orange>easy</soft_orange> for you to remember.
        - ''
        - <soft_red>→</soft_red> Only <soft_red>letters</soft_red>, <soft_red>digits</soft_red> and an <soft_red>underscore</soft_red> are allowed.
        Width: 400
    Name:
      Body:
        Contents: Enter the <soft_yellow>display name</soft_yellow>.
        Width: 400
      Input:
        Name: Name
        ReplaceName: Replace Item Name
    Description:
      Body:
        Contents: Enter the <soft_yellow>description</soft_yellow>.
        Width: 400
      Input:
        Description: Description
        ReplaceItemLore: Replace Item Lore
    Item:
      Body:
        Normal:
          Contents:
          - Please confirm item replacement.
          - <gray>Check the additional fields if needed.</gray>
          Width: 400
        Custom:
          Contents:
          - Please confirm item replacement.
          - <gray>Check the additional fields if needed.</gray>
          - ''
          - <soft_red><b>IMPORTANT NOTE:</b></soft_red>
          - If the item above doesn't match the one you used, enable the <soft_red>Save as NBT</soft_red> option.
          - <gray>This ensures the exact item data is saved correctly.</gray>
          Width: 400
      Input:
        NBT: <soft_red>Save as NBT</soft_red>
        ReplaceName: Inherit Item's Name
        ReplaceDesc: Inherit Item's Lore
