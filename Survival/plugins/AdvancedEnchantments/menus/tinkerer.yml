# Archivo de configuración para el inventario del Chatarrero.
# Por favor, ten cuidado al editar este archivo.
# Se recomienda usar un validador YAML y un editor de texto que soporte YAML.
# https://yamlchecker.com/

# Soporte y Documentación:
# https://discord.com/invite/GzdQdMw
# https://ae.advancedplugins.net/

general:
  settings:
    # Si es 'true', se mostrarán los ítems de confirmación para el usuario y el chatarrero.
    enabled-confirm-items: true
    # Las casillas (slots) del ítem separador entre el usuario y el chatarrero.
    # ADVERTENCIA: Si no sabes qué es esto, no lo cambies.
    # Por defecto: 4, 13, 22, 31, 40, 49
    splitter-slots: "4, 13, 22, 31, 40, 49"
    # Las casillas del lado del usuario en el inventario.
    # ADVERTENCIA: Si no sabes qué es esto, no lo cambies.
    # Por defecto: 1, 2, 3, 9, 10, 11, 12, 18, 19, 20, 21, 27, 28, 29, 30, 36, 37, 38, 39, 45, 46, 47, 48
    player-slots: "1, 2, 3, 9, 10, 11, 12, 18, 19, 20, 21, 27, 28, 29, 30, 36, 37, 38, 39, 45, 46, 47, 48"
    # Las casillas del lado del chatarrero en el inventario.
    # ADVERTENCIA: Si no sabes qué es esto, no lo cambies.
    # Por defecto: 5, 6, 7, 14, 15, 16, 17, 23, 24, 25, 26,32, 33, 34, 35, 41, 42, 43, 44, 50, 51, 52, 53
    tinkerer-slots: "5, 6, 7, 14, 15, 16, 17, 23, 24, 25, 26, 32, 33, 34, 35, 41, 42, 43, 44, 50, 51, 52, 53"
  # Los precios de los ítems ofrecidos por el chatarrero.
  prices:
    # Esto decide si el chatarrero usa experiencia o dinero (exp/money) como moneda.
    # También determina el ítem ofertado por el chatarrero. (ver abajo)
    type: exp
    # Define cuánta moneda se debe pagar por los ítems
    # por número de encantamiento (3 encantamientos = x3 la cantidad, y así sucesivamente)
    amount: 26
    # Fórmula más avanzada para el cálculo del chatarrero,
    # establece en '%amount%' si quieres dar una cantidad fija (de "amount")
    # - Variables:
    #   %amount% = cantidad de la configuración anterior
    #   %enchants% = número de encantamientos en el ítem
    #   %durability% = porcentaje de durabilidad restante, si al ítem le queda la mitad, sería 0.5
    formula: "(%amount%*%enchants%)*%durability%"
  # Los ítems ofrecidos por el chatarrero.
  # Si el tipo de precio es dinero (money), se usará el ítem de dinero.
  # Si el tipo de precio es experiencia (exp), se usará el ítem de exp.
  tinkerer-items:
    money:
      type: FEATHER
      id: 0
      custom-model-data: 9999
      name: "&cVale de Dinero &7(%amount%)"
      lore:
        - "&cRecibido del &fEncantador"
        - "&cRecibido por &f%name%"
    exp:
      type: FEATHER
      id: 0
      custom-model-data: 9999
      name: "&a&lBotella de Experiencia &7(lanzar)"
      lore:
        - "&dValor &f%amount% XP"
        - "&dEncantador &fEncantador del Servidor"

  # No ofrecer polvos misteriosos, sino solo ítems de tinkerer-items
  give-item-instead-of-dust:
    enabled: false
    # Continúa listando todos los grupos aquí
    # Si el grupo no está presente, se usará el valor por defecto de 100
    amountPerGroup:
      SIMPLE: 100
      UNIQUE: 200
inventory:
  # Sonido al abrir el inventario del chatarrero.
  # Establecer en "none" para desactivar
  open-sound: "BLOCK_CHEST_OPEN"
  name: "&f᪄᪓"
  items:
    # El ítem para aceptar el intercambio.
    accept-trade-item:
      type: FEATHER
      id: 14
      custom-model-data: 9999
      slot: 0
      name: "&eClick para ACEPTAR intercambio"
      lore: []
    # El ítem mostrado después de aceptar el intercambio.
    # Si quieres desactivar este ítem, establece
    # enabled-confirm-items en false. (ver arriba del archivo)
    player-confirm-trade-item:
      type: FEATHER
      id: 5
      custom-model-data: 9999
      slot: 0
      name: "&aClick para confirmar la transacción"
      lore: []
      sound: BLOCK_LEVER_CLICK
    # El ítem mostrado después de aceptar el intercambio (lado del chatarrero).
    # Por defecto, el ítem es el mismo que player-confirm-trade-item
    # y está ubicado en el otro lado.
    tinkerer-confirm-trade-item:
      # Si quieres desactivar este ítem
      # establece en false.
      enabled: true
      type: FEATHER
      id: 5
      custom-model-data: 9999
      slot: 8
      name: "&aClick para confirmar la transacción"
      lore: []
    # Los ítems que separan el lado del jugador y el lado del chatarrero.
    splitter-item:
      enabled: true
      type: FEATHER
      id: 0
      custom-model-data: 9999
      name: " "
      lore: []

# ADVERTENCIA: No toques esto
version: 1.0.0