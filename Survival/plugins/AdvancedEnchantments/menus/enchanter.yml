# Inventario de confirmación para los pagos del encantador
# Confirma o deniega la transacción, actúa como una confirmación de 2 pasos
confirmation-inventory:
  enabled: true
  name: "&f᪄᪑"
  accept:
    material: FEATHER
    custom-model-data: 9999
    name: "&aAceptar transacción"
    lore:
      - "&7→ Costo: {#c0e45a}%price%&f᪠"
    damage: 5
  cancel:
    material: FEATHER
    custom-model-data: 9999
    name: "&cCancelar transacción."
    lore: []
    damage: 14