# Configuración para el Encantador (Enchanter)
# Cambia los comandos para acceder a él en la parte superior de config.yml

# establece en "none" para desactivar
open-sound: ENDERDRAGON_WINGS
# En qué mundos está desactivado el encantador
disabled-in-worlds:
  - bad_world
messages:
  sound: ENTITY_PLAYER_LEVELUP
right-click-to-view-enchants: true
go-back-item:
  enabled: true
  item:
    type: FEATHER
    id: 0
    custom-model-data: 9999
  name: "&c&lVolver Atrás"
  lore: []
# ¿Debería el encantador permanecer abierto después de comprar un objeto?
keep-open: true
# Tamaño del inventario del Encantador
# 9-18-27-36-45-54
#
# Variables (Placeholders):
#  %group-enchant-count% - número de encantamientos en el grupo
#  %price% - precio
#  %left% - experiencia restante necesaria hasta que el jugador pueda comprar el objeto
# Economía:
# exp, money, level, souls (funciona con items que se sostienen al abrir el inventario), diamonds, gold (gold ingots), emeralds
inventory:
  size: 44
  name: "&f᪄᪐"
  settings:
    # ¿Qué nivel de libros debería dar el encantador?
    # "ALL" - da todos los niveles
    # <número> - Da un nivel específico de encantamiento
    enchanterBookLevel: ALL
  items:
