gemify:
  display: "%group-color%Gemificación"
  description: |-
    &fProbabilidad de que un bloque de mineral
    &fse convierta en su bloque.
  applies-to: ᪩
  type: MINING
  group: FABLED
  settings:
    showActionBar: true
  applies:
    - ALL_PICKAXE
  levels:
    "1":
      chance: 3
      cooldown: 5
      effects:
        - PARTICLE:GLOW:30:0.5 @Block
        - PLAY_SOUND:ENTITY_PLAYER_LEVELUP @Self
        - >-
          SET_BLOCK:GOLD_BLOCK @Block <condition>%block type% contains GOLD_ORE
          : %allow%</condition>
        - >-
          SET_BLOCK:IRON_BLOCK @Block <condition>%block type% contains IRON_ORE
          : %allow%</condition>
        - >-
          SET_BLOCK:COAL_BLOCK @Block <condition>%block type% contains COAL_ORE
          : %allow%</condition>
        - >-
          SET_BLOCK:EMERALD_BLOCK @Block <condition>%block type% contains
          EMERALD_ORE : %allow%</condition>
        - >-
          SET_BLOCK:COPPER_BLOCK @Block <condition>%block type% contains
          copper_ore : %allow%</condition>
        - >-
          SET_BLOCK:REDSTONE_BLOCK @Block <condition>%block type% contains
          redstone_ore : %allow%</condition>
        - >-
          SET_BLOCK:LAPIS_BLOCK @Block <condition>%block type% contains
          lapis_ore : %allow%</condition>
        - >-
          SET_BLOCK:DIAMOND_BLOCK @Block <condition>%block type% contains
          diamond_ore : %allow%</condition>
