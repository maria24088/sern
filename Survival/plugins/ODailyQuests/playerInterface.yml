# ======================================================
# AquГӯ puedes crear tu propia interfaz de misiones de jugador.
#
# NUNCA BORRES UNA %variable%
# %progress% se reemplaza por el progreso de la misiГіn.
# %required% se reemplaza por la cantidad requerida para completar la misiГіn.
# %achieved% se reemplaza por el nГәmero de misiones completadas.
# %drawIn% se reemplaza por el tiempo restante antes del prГіximo sorteo de misiones.
# ======================================================
player_interface:
  size: 27
  use_placeholders: true
  inventory_name: '&f%img_offset_-8%%img_daily_quest%'
